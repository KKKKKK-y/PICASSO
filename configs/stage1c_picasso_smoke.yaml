project:
  name: PICASSO
  stage: stage1c_picasso_smoke
system:
  n_tx: 4
  n_rx: 4
  n_subcarriers: 64
  n_paths: 6
  pilot_ratio: 0.25
  pilot_ratios_eval: [0.5, 0.25, 0.125, 0.0625]
data:
  num_samples: 256
  batch_size: 32
  seed: 42
  save_generated_data: false
model:
  generator:
    base_channels: 32
    num_blocks: 3
  discriminator:
    base_channels: 32
loss:
  lambda_rec: 1.0
  lambda_adv: 0.01
  lambda_pilot: 1.0
  lambda_smooth: 0.1
  lambda_sparse: 0.1
training:
  smoke_epochs: 2
  learning_rate_g: 0.0001
  learning_rate_d: 0.0001
  device: cuda
artifact_policy:
  save_checkpoints: false
  save_outputs: false
  save_numpy_arrays: false
