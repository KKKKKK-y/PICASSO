project:
  name: PICASSO
  stage: stage3a_supervised_physics

system:
  n_tx: 4
  n_rx: 4
  n_subcarriers: 64
  n_paths: 6

channel:
  random_n_paths: true
  min_paths: 3
  max_paths: 10
  delay_spread: random
  gain_distribution: complex_gaussian
  normalize_channel: true
  pilot_noise_only: true

data:
  train_samples: 8192
  val_samples: 2048
  test_samples: 2048
  batch_size: 64
  seeds: [42, 123, 2026]
  pilot_ratios: [0.5, 0.25, 0.125, 0.0625]
  snr_db_values: [10, 20, 30]
  save_generated_data: false

training:
  epochs: 40
  device: cuda
  learning_rate: 0.0001
  early_stop_patience: 8
  max_runtime_hours: 5
  allow_reduced_grid_if_runtime_high: true

models:
  run_ls: true
  run_dncnn: true
  run_enhanced_dncnn: true
  run_picasso_rec: true
  run_picasso_rec_physics: true
  run_picasso_full_light_adv: true

loss:
  lambda_rec: 1.0
  lambda_adv: 0.001
  lambda_pilot: 1.0
  lambda_smooth: 0.05
  lambda_sparse: 0.05

diagnosis:
  reduced_grid_seeds: [42, 123, 2026]
  reduced_grid_pilot_ratios: [0.5, 0.25, 0.125, 0.0625]
  reduced_grid_snr_db_values: [10, 20, 30]
  reduced_train_samples: 1024
  reduced_val_samples: 256
  reduced_test_samples: 512
  reduced_epochs: 5
  reduced_early_stop_patience: 3

outputs:
  results_dir: outputs/results
  raw_csv: stage3a_raw_results.csv
  summary_csv: stage3a_summary.csv
  paper_table_csv: stage3a_paper_table.csv
  diagnosis_csv: stage3a_diagnosis.csv
  analysis_md: docs/stage3a_supervised_physics.md

artifact_policy:
  save_checkpoints: false
  save_outputs: false
  save_numpy_arrays: false
  save_csv_results: true
  save_markdown_report: true
