project:
  name: PICASSO
  stage: stage1a_smoke_baseline
system:
  n_tx: 4
  n_rx: 4
  n_subcarriers: 64
  n_paths: 6
  pilot_ratio: 0.25
data:
  train_samples: 128
  val_samples: 32
  test_samples: 32
  save_generated_data: false
model:
  name: cnn_baseline
  input_channels: 4
  output_channels: 2
  hidden_channels: 32
training:
  batch_size: 16
  epochs: 2
  learning_rate: 0.001
  seed: 42
  use_cuda: true
artifact_policy:
  save_checkpoints: false
  save_numpy_data: false
  save_outputs: false
