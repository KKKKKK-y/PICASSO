project:
  name: PICASSO
  task: sparse_pilot_csi_reconstruction
  target_journal: IEEE Communications Letters
  target_paper: "PICASSO: Physics-Informed Channel Synthesis from Sparse Pilot Observations"

system:
  n_tx: 4
  n_rx: 4
  n_subcarriers: 64
  n_paths: 6
  pilot_ratios:
    - 0.5
    - 0.25
    - 0.125
    - 0.0625

data:
  train_samples: 10000
  val_samples: 2000
  test_samples: 2000
  save_generated_data: false

model:
  generator: unet_or_resnet_placeholder
  discriminator: patch_discriminator_placeholder

loss:
  lambda_rec: 1.0
  lambda_adv: 0.01
  lambda_pilot: 1.0
  lambda_smooth: 0.1
  lambda_sparse: 0.1

training:
  batch_size: 32
  learning_rate: 0.0001
  epochs: 100
  seed: 42
